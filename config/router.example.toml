[profiles]
local_fast = "qwen-fast-mpro-tb"
local_heavy = "qwen-mpro-tb"
cloud = "cloud"

[database]
path = ".codex-adv/memory.db"

[routing]
simple_complexity_threshold = 3
prefer_local_task_types = ["explain", "single_file_edit", "small_fix", "test_help"]
cloud_task_types = ["multi_file_edit", "architecture", "large_refactor"]
min_local_success_rate = 0.7

[fallback]
enabled = true
max_attempts = 2
failure_markers = ["I cannot", "TODO", "not implemented", "insufficient context"]
min_output_chars = 40

[execution]
web_search = "disabled"
dangerous_bypass_approvals_and_sandbox = false
ephemeral_codex_sessions = true
reuse_codex_sessions = false

[rewrites.local]
style = "compress"

[rewrites.cloud]
style = "structure"
