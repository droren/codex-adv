name: Quality

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check src tests

      - name: Security audit
        run: python -m bandit -c pyproject.toml -r src

      - name: Tests
        run: python -m pytest
